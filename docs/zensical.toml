[project]
site_name = "Mustang"
site_url = "https://phonepe.github.io/mustang"
repo_url = "https://github.com/PhonePe/mustang"
copyright = "Copyright &copy; 2024-2026 PhonePe India Pvt. Ltd."

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"The Algorithm" = "algorithm.md"},
  {"Concepts" = [
    {"Predicates & Details" = "concepts/predicates.md"},
    {"PreOperations" = "concepts/preoperations.md"},
    {"Scoring & Ranking" = "concepts/scoring.md"},
    {"Error Codes" = "concepts/error-codes.md"}
  ]},
  {"Engine API" = [
    {"Indexing" = "engine/indexing.md"},
    {"Searching" = "engine/searching.md"},
    {"Advanced Operations" = "engine/advanced.md"}
  ]},
  {"Examples" = [
    {"Ad Targeting" = "examples/ad-targeting.md"},
    {"Pub/Sub Routing" = "examples/pubsub.md"},
    {"Feature Flags & Version Gates" = "examples/version-gates.md"},
    {"PreOperation Recipes" = "examples/preoperation-recipes.md"}
  ]},
  {"Dropwizard Bundle" = "dropwizard.md"},
  {"Benchmarks" = "benchmarks.md"},
  {"Playground" = "playground.md"}
]

[project.theme]
features = [
  "navigation.tracking",
  "navigation.path",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.expand",
  "navigation.top",
  "toc.follow",
  "content.code.copy",
  "content.code.annotate",
  "search.suggest",
  "search.highlight",
  "search.share"
]

[[project.theme.palette]]
media  = "(prefers-color-scheme: light)"
scheme = "default"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
media  = "(prefers-color-scheme)"

[project.theme.palette.toggle]
icon = "material/brightness-auto"
name = "Switch to light mode"

[[project.theme.palette]]
media  = "(prefers-color-scheme: dark)"
scheme = "slate"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to system preference"

[project.plugins.glightbox]

[project.plugins.awesome-pages]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.admonition]

[project.markdown_extensions.tables]

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.emoji"]
emoji_index     = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
